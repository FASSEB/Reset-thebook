<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WIP</title>
  <style>
    :root {
      --bg: #080c18;
      --panel: rgba(18, 28, 50, 0.92);
      --primary: #4fd1ff;
      --accent: #9f7aea;
      --text: #f8fbff;
      --muted: #9bacce;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, rgba(79, 209, 255, 0.18), transparent 24%),
                  radial-gradient(circle at 80% 20%, rgba(159, 122, 234, 0.12), transparent 20%),
                  linear-gradient(180deg, #07101f 0%, #0f192d 55%, #0b1322 100%);
      color: var(--text);
    }

    .card {
      width: min(640px, calc(100vw - 40px));
      padding: 36px;
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 0% 0%, rgba(79, 209, 255, 0.13), transparent 28%),
                  radial-gradient(circle at 100% 100%, rgba(159, 122, 234, 0.12), transparent 22%);
      pointer-events: none;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .progress-shell {
      display: grid;
      gap: 20px;
    }

    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-variant-numeric: tabular-nums;
    }

    .status strong {
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .bar {
      width: 100%;
      height: 20px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, rgba(79,209,255,1), rgba(159,122,234,1));
      border-radius: inherit;
      box-shadow: 0 0 18px rgba(79, 209, 255, 0.4);
      transition: width 0.4s ease;
      position: relative;
    }

    .bar-fill::after {
      content: '';
      position: absolute;
      top: 0;
      right: 12px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.48);
      filter: blur(1px);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
      color: #081421;
      background: white;
      font-weight: 700;
      box-shadow: 0 14px 30px rgba(8, 14, 33, 0.15);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    button.secondary {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .glow {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      z-index: 0;
    }

    .glow.top {
      top: -70px;
      left: -90px;
      background: rgba(79,209,255,0.5);
    }

    .glow.bottom {
      bottom: -80px;
      right: -80px;
      background: rgba(159,122,234,0.4);
    }

    .card-content {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow top"></div>
    <div class="glow bottom"></div>
    <div class="card-content">
      <h1 style="text-align: center;">Working progress</h1>
    </div>
  </div>
</body>
</html>
